<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KotoMusic Beta</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --green: #1db954; --bg: #121212; --text: #b3b3b3; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .playlist { width: 300px; background: #000; border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .track-item { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 8px; background: #181818; border: 1px solid transparent; }
        .track-item:hover { background: #282828; }
        .track-item.active { border-color: var(--green); }
        .lyrics-view { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; background: linear-gradient(180deg, #222 0%, #121212 100%); overflow-y: auto; scroll-behavior: smooth; }
        .lyric-line { font-size: 24px; font-weight: bold; margin: 15px 0; color: #444; transition: 0.3s; text-align: center; }
        .lyric-line.active { color: white; transform: scale(1.05); }
        .player-bar { background: #181818; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #333; }
        #cover { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; background: #333; }
        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; }
        #play-btn { background: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; }
        .prog-box { width: 100%; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        input[type="range"] { flex: 1; accent-color: var(--green); cursor: pointer; }
    </style>
</head>
<body>

<div class="main">
    <div class="playlist" id="playlist">
        <h3 style="margin-top:0">Медиатека</h3>
        <div id="list-content">Загрузка...</div>
    </div>
    <div class="lyrics-view" id="lyrics-win">
        <div id="lyrics-content">Ожидание трека...</div>
    </div>
</div>

<div class="player-bar">
    <div style="display:flex; align-items:center; gap:12px; width:30%;">
        <img id="cover" src="">
        <div style="overflow:hidden">
            <div id="title" style="font-weight:bold; font-size:14px;">---</div>
            <div id="artist" style="font-size:12px; color:var(--text)">---</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="p.toggle()" id="play-btn">▶</button>
        <div class="prog-box">
            <span id="cur" style="font-size:10px">0:00</span>
            <input type="range" id="prog" value="0" step="0.1">
            <span id="dur" style="font-size:10px">0:00</span>
        </div>
    </div>
    <div style="width:30%; text-align:right;">
        <input type="range" id="vol" value="100" style="width:60px;">
    </div>
</div>

<script>
// --- НАСТРОЙКИ ---
const USER = "kotkotenok45";
const REPO = "KM-KotoMusic-Beta";
const FOLDER = "Music";

// ЕСЛИ АВТОМАТИКА НЕ СРАБОТАЕТ, ПРОСТО ДОБАВЬ НАЗВАНИЯ ФАЙЛОВ СЮДА:
const MANUAL_FILES = []; // например ["track1.mp3", "track2.mp3"]
// -----------------

const p = {
    audio: new Audio(),
    tracks: [],
    lyricsData: [],

    async init() {
        try {
            let files;
            const api = `https://api.github.com{USER}/${REPO}/contents/${FOLDER}`;
            const res = await fetch(api);
            
            if (res.ok) {
                const data = await res.json();
                files = data.filter(f => f.name.toLowerCase().endsWith('.mp3')).map(f => f.download_url);
            } else {
                console.warn("API лимит или ошибка. Переключаюсь на ручной список.");
                files = MANUAL_FILES.map(name => `https://raw.githubusercontent.com{USER}/${REPO}/main/${FOLDER}/${encodeURIComponent(name)}`);
            }

            if (!files.length) throw new Error("Музыка не найдена. Проверь папку Music.");

            for (let url of files) {
                const tagData = await this.read(url);
                this.tracks.push(tagData);
            }

            this.render();
            if (this.tracks.length > 0) this.load(0);
        } catch (e) {
            document.getElementById('lyrics-content').innerHTML = `<div style="color:red">${e.message}</div>`;
        }

        this.audio.ontimeupdate = () => this.update();
        document.getElementById('prog').oninput = (e) => this.audio.currentTime = (e.target.value / 100) * this.audio.duration;
        document.getElementById('vol').oninput = (e) => this.audio.volume = e.target.value / 100;
    },

    read(url) {
        return new Promise(res => {
            window.jsmediatags.read(url, {
                onSuccess: (t) => {
                    const { title, artist, lyrics, picture } = t.tags;
                    let img = "";
                    if (picture) {
                        const { data, format } = picture;
                        let b64 = "";
                        for (let i = 0; i < data.length; i++) b64 += String.fromCharCode(data[i]);
                        img = `data:${format};base64,${window.btoa(base64)}`;
                    }
                    res({ url, title: title || decodeURIComponent(url.split('/').pop()), artist: artist || "Unknown", img, lyr: lyrics?.lyrics || lyrics || "" });
                },
                onError: () => res({ url, title: decodeURIComponent(url.split('/').pop()), artist: "Unknown", img: "", lyr: "" })
            });
        });
    },

    render() {
        document.getElementById('list-content').innerHTML = this.tracks.map((t, i) => 
            `<div class="track-item" id="t-${i}" onclick="p.load(${i}, true)"><b>${t.title}</b><br><small>${t.artist}</small></div>`
        ).join('');
    },

    load(idx, play = false) {
        const t = this.tracks[idx];
        this.audio.src = t.url;
        document.getElementById('title').innerText = t.title;
        document.getElementById('artist').innerText = t.artist;
        document.getElementById('cover').src = t.img || "https://via.placeholder.com";
        this.parse(t.lyr);
        document.querySelectorAll('.track-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        if (play) this.audio.play();
        document.getElementById('play-btn').innerText = '⏸';
    },

    parse(txt) {
        const cont = document.getElementById('lyrics-content');
        this.lyricsData = [];
        if (txt.includes('[')) {
            txt.split('\n').forEach(line => {
                const m = line.match(/^\[(\d{2}):(\d{2}(?:\.\d+)?)\](.*)/);
                if (m) this.lyricsData.push({ time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() });
            });
            cont.innerHTML = this.lyricsData.map((l, i) => `<div class="lyric-line" id="l-${i}">${l.text}</div>`).join('');
        } else {
            cont.innerHTML = `<pre style="color:white; font-size:16px; text-align:center;">${txt || "Нет текста"}</pre>`;
        }
    },

    toggle() { 
        if (this.audio.paused) { this.audio.play(); document.getElementById('play-btn').innerText = '⏸'; }
        else { this.audio.pause(); document.getElementById('play-btn').innerText = '▶'; }
    },

    update() {
        if (this.audio.duration) {
            document.getElementById('prog').value = (this.audio.currentTime / this.audio.duration) * 100;
            document.getElementById('cur').innerText = this.fmt(this.audio.currentTime);
            document.getElementById('dur').innerText = this.fmt(this.audio.duration);
        }
        const cur = this.audio.currentTime;
        const idx = this.lyricsData.findIndex((l, i) => cur >= l.time && (!this.lyricsData[i+1] || cur < this.lyricsData[i+1].time));
        if (idx !== -1) {
            document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
            const el = document.getElementById(`l-${idx}`);
            if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }
    },
    fmt: s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2, '0')}`
};
p.init();
</script>
</body>
</html>
