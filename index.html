<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    <style>
        :root {
            --spotify-green: #1db954;
            --bg-black: #121212;
            --card-grey: #181818;
            --text-grey: #b3b3b3;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Список треков */
        .playlist {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .track-item:hover { background: #282828; }
        .track-item.active { color: var(--spotify-green); }

        .track-img { width: 40px; height: 40px; border-radius: 4px; margin-right: 15px; }

        /* Панель управления (Player Bar) */
        .player-bar {
            background: #181818;
            border-top: 1px solid #282828;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-info { display: flex; align-items: center; width: 30%; }
        .current-info img { width: 56px; height: 56px; border-radius: 4px; margin-right: 15px; }

        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; }
        .buttons { margin-bottom: 10px; display: flex; gap: 20px; align-items: center; }

        button {
            background: none; border: none; color: white; cursor: pointer; font-size: 18px;
            transition: transform 0.1s;
        }

        button:hover { transform: scale(1.1); }
        #play-btn { 
            background: white; color: black; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { 
            flex: 1; accent-color: var(--spotify-green); cursor: pointer; height: 4px;
        }
        
        .time { font-size: 12px; color: var(--text-grey); min-width: 35px; }
    </style>
</head>
<body>

    <div class="playlist" id="playlist">
        <h2>Моя медиатека</h2>
        <!-- Треки вставятся через JS -->
    </div>

    <div class="player-bar">
        <div class="current-info">
            <img src="https://via.placeholder.com" id="curr-cover">
            <div>
                <div id="curr-title">Выберите трек</div>
                <div id="curr-artist" style="font-size: 12px; color: var(--text-grey);">---</div>
            </div>
        </div>

        <div class="controls">
            <div class="buttons">
                <button onclick="player.prev()">⏮</button>
                <button id="play-btn" onclick="player.toggle()">▶</button>
                <button onclick="player.next()">⏭</button>
            </div>
            <div class="progress-container">
                <span class="time" id="time-current">0:00</span>
                <input type="range" id="progress" value="0">
                <span class="time" id="time-total">0:00</span>
            </div>
        </div>

        <div style="width: 30%; text-align: right;">
            <span style="font-size: 14px;">🔊</span>
            <input type="range" id="volume" value="100" style="width: 80px;">
        </div>
    </div>

    <script>
        // Данные (имитация базы данных)
        const songs = [
            { title: "Lost in City", artist: "Night Owl", cover: "https://picsum.photos", url: "https://www.soundhelix.com" },
            { title: "Desert Wind", artist: "Sandstorm", cover: "https://picsum.photos", url: "https://www.soundhelix.com" },
            { title: "Ocean Waves", artist: "Aqua", cover: "https://picsum.photos", url: "https://www.soundhelix.com" }
        ];

        const player = {
            audio: new Audio(),
            currentIndex: 0,
            isPlaying: false,

            init() {
                this.renderPlaylist();
                this.loadTrack(0);

                // События аудио
                this.audio.ontimeupdate = () => this.updateProgress();
                this.audio.onended = () => this.next();
                
                // Громкость
                document.getElementById('volume').oninput = (e) => this.audio.volume = e.target.value / 100;
                
                // Перемотка
                document.getElementById('progress').oninput = (e) => {
                    const time = (e.target.value / 100) * this.audio.duration;
                    this.audio.currentTime = time;
                };
            },

            renderPlaylist() {
                const container = document.getElementById('playlist');
                songs.forEach((song, index) => {
                    const div = document.createElement('div');
                    div.className = 'track-item';
                    div.innerHTML = `
                        <img src="${song.cover}" class="track-img">
                        <div>
                            <div>${song.title}</div>
                            <div style="font-size:12px; color:var(--text-grey)">${song.artist}</div>
                        </div>
                    `;
                    div.onclick = () => this.loadTrack(index, true);
                    container.appendChild(div);
                });
            },

            loadTrack(index, autoPlay = false) {
                this.currentIndex = index;
                const song = songs[index];
                this.audio.src = song.url;
                
                document.getElementById('curr-title').innerText = song.title;
                document.getElementById('curr-artist').innerText = song.artist;
                document.getElementById('curr-cover').src = song.cover;
                
                // Подсветка активного трека
                document.querySelectorAll('.track-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });

                if (autoPlay) this.play();
            },

            toggle() {
                this.isPlaying ? this.pause() : this.play();
            },

            play() {
                this.audio.play();
                this.isPlaying = true;
                document.getElementById('play-btn').innerText = '⏸';
            },

            pause() {
                this.audio.pause();
                this.isPlaying = false;
                document.getElementById('play-btn').innerText = '▶';
            },

            next() {
                let nextIndex = (this.currentIndex + 1) % songs.length;
                this.loadTrack(nextIndex, true);
            },

            prev() {
                let prevIndex = (this.currentIndex - 1 + songs.length) % songs.length;
                this.loadTrack(prevIndex, true);
            },

            updateProgress() {
                const prog = document.getElementById('progress');
                const currTime = document.getElementById('time-current');
                const totalTime = document.getElementById('time-total');

                if (this.audio.duration) {
                    prog.value = (this.audio.currentTime / this.audio.duration) * 100;
                    currTime.innerText = this.formatTime(this.audio.currentTime);
                    totalTime.innerText = this.formatTime(this.audio.duration);
                }
            },

            formatTime(seconds) {
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return `${min}:${sec < 10 ? '0' + sec : sec}`;
            }
        };

        player.init();
    </script>
</body>
</html>
